name: Build — macOS & Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── macOS arm64 (Apple Silicon) ───────────────────────────────────────────
  build-macos:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download Go modules
        run: go mod download

      - name: Download ffmpeg arm64 (Apple Silicon)
        run: |
          mkdir -p assets
          curl -fsSL "https://evermeet.cx/pub/ffmpeg/ffmpeg-7.1.zip" \
               -o /tmp/ffmpeg-arm64.zip
          unzip -o /tmp/ffmpeg-arm64.zip ffmpeg -d /tmp/ffmpeg-arm64/
          cp /tmp/ffmpeg-arm64/ffmpeg assets/ffmpeg-darwin-arm64
          chmod +x assets/ffmpeg-darwin-arm64

          curl -fsSL "https://evermeet.cx/pub/ffprobe/ffprobe-7.1.zip" \
               -o /tmp/ffprobe-arm64.zip
          unzip -o /tmp/ffprobe-arm64.zip ffprobe -d /tmp/ffprobe-arm64/
          cp /tmp/ffprobe-arm64/ffprobe assets/ffprobe-darwin-arm64
          chmod +x assets/ffprobe-darwin-arm64

      - name: Build macOS arm64
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w" \
            -o dist/videocompress-darwin-arm64 .

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: videocompress-macos-arm64
          path: dist/videocompress-darwin-arm64

  # ── Windows x64 ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # windows-latest runners ship MSYS2 with MinGW-w64 pre-installed
      - name: Add MinGW-w64 to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download Go modules
        run: go mod download

      - name: Download ffmpeg for Windows
        shell: pwsh
        run: .\setup.ps1

      - name: Build Windows exe
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=1 CC=gcc \
          GOOS=windows GOARCH=amd64 \
          go build -ldflags="-s -w -H windowsgui" \
            -o dist/videocompress-windows-amd64.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: videocompress-windows
          path: dist/videocompress-windows-amd64.exe

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: videocompress-macos-arm64
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: videocompress-windows
          path: release/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
